<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceHub - Comunidad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="particles-js"></div>

    <div id="login-screen" class="container">
        <div class="card">
            <h2>Acceso ServiceHub</h2>
            <input type="text" id="full-name" placeholder="Tu Nombre Real (para el perfil)">
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="handleAuth()">Entrar o Registrarse</button>
        </div>
    </div>

    <div id="main-screen" class="app-wrapper hidden">
        
        <header class="main-header">
            <div class="user-profile">
                <img id="user-avatar" src="img/image.png" onerror="this.src='img/image.png'" class="nav-avatar">
                <h1>Hola, <span id="user-display"></span></h1>
            </div>
            
            <div class="dropdown">
                <button class="dropbtn">Mi Cuenta ▼</button>
                <div class="dropdown-content">
                    <a href="config/index.html">⚙️ Mi Perfil</a>
                    <a href="#" onclick="logout()">❌ Salir</a>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <div class="content-area">
                <button onclick="window.location.href='serv/index.html'" style="margin-bottom:20px; background:#3498db; color:white; padding:15px; border-radius:10px; width:100%; font-weight:bold; cursor:pointer;">
                    ➕ Publicar un nuevo servicio
                </button>
                <div id="service-list"></div>
            </div>

            <aside class="sidebar">
                <div class="sidebar-card">
                    <h4>Miembros Activos</h4>
                    <div id="suggested-users-list"></div>
                </div>
            </aside>
        </div>
    </div>
    
    <div id="message-modal" class="modal hidden">
        <div class="card modal-content">
            <h3>Enviar mensaje a <span id="msg-recipient-name"></span></h3>
            <p>Asunto: <strong id="msg-service-title"></strong></p>
            <textarea id="msg-text" placeholder="Escribe tu propuesta o duda aquí..." rows="4"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="sendMessage()" class="btn-publish">Enviar Mensaje</button>
                <button onclick="closeModal()" style="background:var(--dark)">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="particles-config.js"></script>
</body>
</html>
