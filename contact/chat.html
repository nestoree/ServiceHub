<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privado - ServiceHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">
    <div class="container" style="margin-top: 20px;">
        <div class="chat-container">
            <div class="chat-header">
                <a
                    href="../index.html"
                    class="chat-back-link"
                    aria-label="Volver a la pantalla principal"
                >
                    ← Volver a la pantalla principal
                </a>
                <div class="chat-header-copy">
                    <span class="chat-header-label">Chat privado</span>
                    <h3 id="chat-partner-name">Chat</h3>
                </div>
            </div>
            <div id="chat-history" class="chat-history"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje...">
                <button id="btn-send-chat" class="btn-chat">Enviar</button>
            </div>
        </div>
    </div>
    <script type="module" src="chat.js"></script>
</body>
</html>
