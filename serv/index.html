<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Servicio - ServiceHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>

    <div class="container">
        <div class="publish-card">
            <a href="../index.html" class="back-link">← Volver al inicio</a>
            <h2>📢 Publicar nuevo servicio</h2>
            
            <div class="input-group">
                <label>¿Qué servicio ofreces?</label>
                <input type="text" id="service-name" placeholder="Ej: Clases de matemáticas, Paseo de perros...">
            </div>

            <div class="input-group">
                <label>Enlace de la imagen (Opcional):</label>
                <input type="url" id="service-image" placeholder="https://ejemplo.com/foto.jpg">
                <small style="color:#888; font-size:12px;">Si lo dejas en blanco, usaremos una imagen por defecto.</small>
            </div>

            <div class="input-group">
                <label>Selecciona los horarios disponibles:</label>
                <div id="time-grid" class="time-grid">
                    </div>
                <p class="selected-info">Horas seleccionadas: <span id="display-time">Ninguna</span></p>
            </div>

            <button id="btn-post" class="btn-main">Publicar Servicio</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
